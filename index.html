<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダイスロール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1.5rem}
.wrap{max-width:560px;margin:0 auto}
h1{font-size:18px;font-weight:500;margin-bottom:1.25rem}
.formula-bar{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;margin-bottom:1rem;background:#fff;border:1px solid #ddd;border-radius:12px;padding:12px}
.ni{width:52px;text-align:center;font-size:15px;padding:6px 4px;border:1px solid #ccc;border-radius:8px;background:#fafafa}
.op{font-size:16px;color:#888}
.lbl{font-size:11px;color:#aaa;text-align:center;display:block;margin-bottom:3px}
.field{display:flex;flex-direction:column;align-items:center}
.btn-roll{font-size:15px;padding:8px 20px;font-weight:600;margin-left:4px;border:1px solid #999;border-radius:8px;background:#fff;-webkit-appearance:none;appearance:none;cursor:pointer}
.result-area{background:#fff;border-radius:12px;border:1px solid #ddd;padding:1rem 1.25rem;min-height:60px}
.result-label{font-size:12px;color:#aaa;margin-bottom:4px}
.result-total{font-size:32px;font-weight:500}
.rolls-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{background:#fafafa;border:1px solid #ccc;border-radius:8px;padding:4px 10px;font-size:13px;font-weight:500;text-align:center}
.chip.max{border-color:#1D9E75;color:#0F6E56}
.chip.min{border-color:#D85A30;color:#993C1D}
.chip.mod{color:#888}
.set-label{font-size:12px;color:#aaa;margin:6px 0 3px}
.summary-row{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.si{font-size:13px;color:#888}
.si span{font-weight:500;color:#1a1a1a}
</style>
</head>
<body>
<div class="wrap">
  <h1>ダイスロール</h1>
  <div class="formula-bar">
    <div class="field"><span class="lbl">数</span><input class="ni" id="n" type="number" min="1" max="100" value="3"></div>
    <span class="op">D</span>
    <div class="field"><span class="lbl">面</span><input class="ni" id="d" type="number" min="2" max="1000" value="6"></div>
    <span class="op">+</span>
    <div class="field"><span class="lbl">修正</span><input class="ni" id="mod" type="number" min="-999" max="999" value="6"></div>
    <span class="op">x</span>
    <div class="field"><span class="lbl">セット</span><input class="ni" id="sets" type="number" min="1" max="20" value="6"></div>
    <button class="btn-roll" id="rollBtn" type="button">ロール</button>
  </div>
  <div class="result-area" id="ra">
    <div class="result-label" id="fl">ボタンを押してロール</div>
    <div id="sc"></div>
    <div class="summary-row" id="sr"></div>
  </div>
</div>
<script type="text/javascript">
function doRoll() {
  var n = Math.max(1, Math.min(100, parseInt(document.getElementById('n').value, 10) || 1));
  var d = Math.max(2, Math.min(1000, parseInt(document.getElementById('d').value, 10) || 6));
  var mod = Math.max(-999, Math.min(999, parseInt(document.getElementById('mod').value, 10) || 0));
  var sets = Math.max(1, Math.min(20, parseInt(document.getElementById('sets').value, 10) || 1));
  var ms = mod >= 0 ? '+' + mod : '' + mod;
  document.getElementById('fl').textContent = n + 'D' + d + (mod ? ms : '') + ' x ' + sets + 'set';
  var sc = document.getElementById('sc');
  sc.innerHTML = '';
  var totals = [];
  for (var s = 0; s < sets; s++) {
    var rolls = [];
    for (var i = 0; i < n; i++) { rolls.push(Math.floor(Math.random() * d) + 1); }
    var sum = mod;
    for (var j = 0; j < rolls.length; j++) { sum += rolls[j]; }
    totals.push(sum);
    var divEl = document.createElement('div');
    if (sets > 1) {
      var sl = document.createElement('div');
      sl.className = 'set-label';
      sl.textContent = 'set' + (s + 1) + ' - ' + sum;
      divEl.appendChild(sl);
    }
    var grid = document.createElement('div');
    grid.className = 'rolls-grid';
    var mx = rolls[0], mn = rolls[0];
    for (var k = 1; k < rolls.length; k++) {
      if (rolls[k] > mx) mx = rolls[k];
      if (rolls[k] < mn) mn = rolls[k];
    }
    for (var l = 0; l < rolls.length; l++) {
      var c = document.createElement('div');
      c.className = 'chip' + (n > 1 && rolls[l] === mx ? ' max' : n > 1 && rolls[l] === mn ? ' min' : '');
      c.textContent = rolls[l];
      grid.appendChild(c);
    }
    if (mod) {
      var mc = document.createElement('div');
      mc.className = 'chip mod';
      mc.textContent = (mod > 0 ? '+' : '') + mod;
      grid.appendChild(mc);
    }
    divEl.appendChild(grid);
    if (sets === 1) {
      var tl = document.createElement('div');
      tl.className = 'result-label';
      tl.style.marginTop = '8px';
      tl.textContent = 'Total';
      divEl.appendChild(tl);
      var tv = document.createElement('div');
      tv.className = 'result-total';
      tv.textContent = sum;
      divEl.appendChild(tv);
    }
    sc.appendChild(divEl);
  }
  var sr = document.getElementById('sr');
  if (sets > 1) {
    var t = 0;
    for (var m = 0; m < totals.length; m++) { t += totals[m]; }
    var mx2 = totals[0], mn2 = totals[0];
    for (var p = 1; p < totals.length; p++) {
      if (totals[p] > mx2) mx2 = totals[p];
      if (totals[p] < mn2) mn2 = totals[p];
    }
    sr.innerHTML = '<div class="si">Total <span>' + t + '</span></div>'
      + '<div class="si">Avg <span>' + (t / sets).toFixed(1) + '</span></div>'
      + '<div class="si">Max <span>' + mx2 + '</span></div>'
      + '<div class="si">Min <span>' + mn2 + '</span></div>';
  } else {
    sr.innerHTML = '';
  }
}
window.onload = function() {
  document.getElementById('rollBtn').onclick = doRoll;
  doRoll();
};
</script>
</body>
</html>
